<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAuth complete</title>
    <script
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
      type="text/javascript"
    ></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #242424;
        background: #f5f5f5;
      }
      main {
        width: min(360px, calc(100vw - 32px));
        padding: 20px;
        background: white;
        border: 1px solid #d1d1d1;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgb(0 0 0 / 12%);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        margin: 0;
        color: #616161;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sign-in complete</h1>
      <p>You can return to Excel.</p>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var sentToOffice = false;
        var payload = {
          type: 'xl-oauth-callback',
          provider: params.get('provider'),
          code: params.get('code'),
          state: params.get('state'),
          error: params.get('error') || params.get('error_description')
        };

        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin);
        }

        function messageOffice() {
          try {
            if (window.Office && Office.context && Office.context.ui && Office.context.ui.messageParent) {
              Office.context.ui.messageParent(JSON.stringify(payload));
              sentToOffice = true;
            }
          } catch (_) {
            sentToOffice = false;
          }
        }

        if (window.Office && Office.onReady) {
          Office.onReady(messageOffice);
        } else {
          messageOffice();
        }

        window.setTimeout(function () {
          if (!sentToOffice) messageOffice();
          window.close();
        }, 600);
      })();
    </script>
  </body>
</html>
