<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening sign-in</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #242424;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <p>Opening sign-in...</p>
    <script>
      (function () {
        var target = new URLSearchParams(window.location.search).get('to');
        if (!target || new URL(target).origin !== 'https://openrouter.ai') {
          document.body.textContent = 'Invalid sign-in target.';
          return;
        }
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
